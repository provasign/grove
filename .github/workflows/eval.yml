name: Edge accuracy
on:
  push:
    branches: [main]
    paths:
      - "internal/**"
      - "pkg/**"
      - "eval/**"
      - ".github/workflows/eval.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/**"
      - "pkg/**"
      - "eval/**"
      - ".github/workflows/eval.yml"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GO_VERSION: "1.26.3"
  GIN_COMMIT: d75fcd4
jobs:
  calls-accuracy:
    name: calls edges vs go-ssa-vta (gin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            eval/go.sum
      - name: Clone gin at corpus pin
        run: |
          git clone --quiet https://github.com/gin-gonic/gin.git /tmp/gin
          git -C /tmp/gin checkout --quiet "$GIN_COMMIT"
          (cd /tmp/gin && go mod download)
      - name: Build grove-eval
        working-directory: eval
        run: go build -o /tmp/grove-eval ./cmd/grove-eval
      - name: Generate ground truth (deterministic per pin)
        run: /tmp/grove-eval truth --repo /tmp/gin --commit "$GIN_COMMIT" --out /tmp/calls-truth.jsonl
      - name: Score against baseline
        run: /tmp/grove-eval score --repo /tmp/gin --truth /tmp/calls-truth.jsonl --out-dir /tmp/eval-out --baseline eval/baseline.json
      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard
          path: /tmp/eval-out/

  python-accuracy:
    name: calls + tests edges vs dynamic oracle (flask)
    runs-on: ubuntu-latest
    env:
      FLASK_COMMIT: 36e4a824
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            go.sum
            eval/go.sum
      - name: Clone flask at corpus pin
        run: |
          git clone --quiet https://github.com/pallets/flask.git /tmp/flask
          git -C /tmp/flask checkout --quiet "$FLASK_COMMIT"
      - name: Build grove-eval
        working-directory: eval
        run: go build -o /tmp/grove-eval ./cmd/grove-eval
      - name: Score calls edges against snapshot baseline
        run: /tmp/grove-eval score --repo /tmp/flask --truth eval/testdata/flask@$FLASK_COMMIT/calls-truth.jsonl.gz --out-dir /tmp/eval-out --baseline eval/baseline.json
      - name: Score tests edges against snapshot baseline
        run: /tmp/grove-eval score-tests --repo /tmp/flask --truth eval/testdata/flask@$FLASK_COMMIT/tests-truth.jsonl.gz --out-dir /tmp/eval-out --baseline eval/baseline-tests.json
      - name: Upload scorecards
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flask-scorecards
          path: /tmp/eval-out/

  ts-accuracy:
    name: calls edges vs ts-compiler-api (socket.io, express)
